name: hurgent_hai_ios
description: "UrgentHai - Ride, Parcel & Store app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.6.3

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Data Models (code generation)
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Utilities
  url_launcher: ^6.3.1

  # UI
  fluttertoast: ^9.0.0
  flutter_screenutil: ^5.9.3
  pinput: ^5.0.0
  carousel_slider: ^5.0.0

  # Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^3.2.5
  json_serializable: ^6.12.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/gifs/
    - assets/icons/

  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/urbanist_variabl_font_wght.ttf
        - asset: assets/fonts/urbanist_italic_variablefont_wght.ttf
          style: italic